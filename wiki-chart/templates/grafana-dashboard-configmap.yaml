{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wiki-chart.fullname" . }}-grafana-dashboards
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "wiki-chart.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  creation-dashboard.json: |-
{{ .Files.Get "dashboards/creation-dashboard.json" | indent 4 }}
{{- end }}
