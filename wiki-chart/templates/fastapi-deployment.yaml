{{- if .Values.fastapi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wiki-chart.fullname" . }}-fastapi
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "wiki-chart.fastapi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.fastapi.replicaCount }}
  selector:
    matchLabels:
      {{- include "wiki-chart.fastapi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wiki-chart.fastapi.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: fastapi
        image: "{{ .Values.fastapi.image_name }}"
        imagePullPolicy: {{ .Values.fastapi.imagePullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: DB_USER
          value: {{ .Values.fastapi.env.DB_USER | quote }}
        - name: DB_PASSWORD
          value: {{ .Values.fastapi.env.DB_PASSWORD | quote }}
        - name: DB_HOST
          value: {{ .Values.fastapi.env.DB_HOST | quote }}
        - name: DB_PORT
          value: {{ .Values.fastapi.env.DB_PORT | quote }}
        - name: DB_NAME
          value: {{ .Values.fastapi.env.DB_NAME | quote }}
        resources:
          {{- toYaml .Values.fastapi.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
{{- end }}
