# FastAPI Application Configuration
fastapi:
  enabled: true
  image_name: "wiki-service:latest"
  imagePullPolicy: IfNotPresent
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: "100m"  # 0.10 vCPU
      memory: "256Mi"
    limits:
      cpu: "250m"  # 0.25 vCPU
      memory: "512Mi"

  env:
    DB_USER: "postgres"
    DB_PASSWORD: "postgres"
    DB_HOST: "wiki-chart-postgresql"
    DB_PORT: "5432"
    DB_NAME: "wiki"

# PostgreSQL Configuration (Bitnami Chart)
postgresql:
  enabled: true
  auth:
    username: "postgres"
    password: "postgres"
    database: "wiki"

  primary:
    resources:
      requests:
        cpu: "400m"  # 0.40 vCPU
        memory: "768Mi"
      limits:
        cpu: "700m"  # 0.70 vCPU
        memory: "1280Mi"  # 1.25Gi

    persistence:
      enabled: true
      size: 2Gi

# Prometheus Configuration
prometheus:
  enabled: true

  server:
    resources:
      requests:
        cpu: "250m"  # 0.25 vCPU
        memory: "600Mi"
      limits:
        cpu: "450m"  # 0.45 vCPU
        memory: "1Gi"

    persistentVolume:
      enabled: true
      size: 2Gi

    service:
      type: ClusterIP
      servicePort: 9090

  # Disable components we don't need
  alertmanager:
    enabled: false

  kube-state-metrics:
    enabled: false

  prometheus-node-exporter:
    enabled: false

  prometheus-pushgateway:
    enabled: false

  # Configure scraping for FastAPI metrics
  serverFiles:
    prometheus.yml:
      scrape_configs:
        - job_name: 'fastapi'
          static_configs:
            - targets: ['wiki-chart-fastapi:8000']
          metrics_path: '/metrics'
          scrape_interval: 15s

# Grafana Configuration
grafana:
  enabled: true

  adminUser: "admin"
  adminPassword: "admin"

  resources:
    requests:
      cpu: "100m"  # 0.10 vCPU
      memory: "256Mi"
    limits:
      cpu: "250m"  # 0.25 vCPU
      memory: "512Mi"

  service:
    type: ClusterIP
    port: 80

  persistence:
    enabled: true
    size: 1Gi

  # Configure Prometheus as datasource
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          url: http://wiki-chart-prometheus-server:9090
          access: proxy
          isDefault: true

  # Configure dashboard provider
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  # Dashboard configuration will be added via ConfigMap
  dashboards:
    default:
      creation-dashboard:
        json: |
          {
            "annotations": {
              "list": [
                {
                  "builtIn": 1,
                  "datasource": {
                    "type": "grafana",
                    "uid": "-- Grafana --"
                  },
                  "enable": true,
                  "hide": true,
                  "iconColor": "rgba(0, 211, 255, 1)",
                  "name": "Annotations & Alerts",
                  "type": "dashboard"
                }
              ]
            },
            "editable": true,
            "fiscalYearStartMonth": 0,
            "graphTooltip": 0,
            "id": 678,
            "links": [],
            "liveNow": false,
            "panels": [
              {
                "datasource": {
                  "type": "prometheus",
                  "uid": "prometheus"
                },
                "fieldConfig": {
                  "defaults": {
                    "color": {
                      "mode": "palette-classic"
                    },
                    "custom": {
                      "axisCenteredZero": false,
                      "axisColorMode": "text",
                      "axisLabel": "",
                      "axisPlacement": "auto",
                      "barAlignment": 0,
                      "drawStyle": "line",
                      "fillOpacity": 10,
                      "gradientMode": "none",
                      "hideFrom": {
                        "tooltip": false,
                        "viz": false,
                        "legend": false
                      },
                      "lineInterpolation": "linear",
                      "lineWidth": 1,
                      "pointSize": 5,
                      "scaleDistribution": {
                        "type": "linear"
                      },
                      "showPoints": "auto",
                      "spanNulls": false,
                      "stacking": {
                        "group": "A",
                        "mode": "none"
                      },
                      "thresholdsStyle": {
                        "mode": "off"
                      }
                    },
                    "mappings": [],
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": null
                        }
                      ]
                    },
                    "unit": "short"
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 8,
                  "w": 24,
                  "x": 0,
                  "y": 0
                },
                "id": 1,
                "options": {
                  "legend": {
                    "calcs": [],
                    "displayMode": "list",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "mode": "single",
                    "sort": "none"
                  }
                },
                "targets": [
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "rate(users_created_total[5m])",
                    "legendFormat": "Users Creation Rate",
                    "range": true,
                    "refId": "A"
                  },
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "rate(posts_created_total[5m])",
                    "legendFormat": "Posts Creation Rate",
                    "range": true,
                    "refId": "B"
                  }
                ],
                "title": "Users and Posts Creation Rate",
                "type": "timeseries"
              }
            ],
            "refresh": "5s",
            "schemaVersion": 38,
            "style": "dark",
            "tags": ["creation", "metrics"],
            "templating": {
              "list": []
            },
            "time": {
              "from": "now-5m",
              "to": "now"
            },
            "timepicker": {},
            "timezone": "",
            "title": "Creation Dashboard",
            "uid": "creation-dashboard-678",
            "version": 1,
            "weekStart": ""
          }

  # Grafana configuration for subpath
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
      serve_from_sub_path: true

# Ingress Configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: ""
      paths:
        - path: /users(/|$)(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: wiki-chart-fastapi
              port:
                number: 8000
        - path: /posts(/|$)(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: wiki-chart-fastapi
              port:
                number: 8000
        - path: /grafana(/|$)(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: wiki-chart-grafana
              port:
                number: 80
