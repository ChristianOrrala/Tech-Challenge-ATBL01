apiVersion: v2
name: wiki-chart
description: A Helm umbrella chart for Wikipedia-like API service with FastAPI, PostgreSQL, Prometheus, and Grafana
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    repository: "oci://registry-1.docker.io/bitnamicharts"
    version: "18.1.9"
    condition: postgresql.enabled

  - name: prometheus
    version: 27.45.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled

  - name: grafana
    version: 10.1.4
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
